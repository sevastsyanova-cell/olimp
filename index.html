    <style>

        const SUPPORT_PHRASES={low:['Даже богини спускаются к подножию.','Не каждый день — вершина.','Спад — это вдох перед подъёмом.'],high:['Ты сияешь. Клиенты это чувствуют.','Сегодня твой след особенно глубокий.','Ты выбрала себя — и это сработало.'],return:['Олимп ждал тебя.','Ты вернулась. Это главное.','Каждый день — новый шанс.']};

        function getDefaultState(){return{screen:'create_wanderer',wandererName:'',wandererEmoji:'',selectedTrack:'',goal:'',goalWhy:'',goalDepth:'',goalHistory:[],values:[],tempo:'',rhythmDays:8,pausedDays:{},startDate:null,days:{},dailyPlan:{},weeklyFocus:{},authorizations:{},weeklyIdentity:{},gratitudeGarden:[],lastActiveDate:null,completedCycles:0,sharingHistory:[],currentViewDay:null,_maelstromShown:false,growData:{step:1,g1:'',g2:'',g3:'',g4:'',r1:'',r2:'',r3:'',r4:'',r5:'',o1:'',o2:'',o3:'',w1:'',w2:'',w3:'',w4:'',w5:''},lightData:{goal:'',signs:'',ownGoal:'',why:'',scale:5,resources:''}};}
        function loadState(){const r=localStorage.getItem(STORAGE_KEY);if(r){try{const s=JSON.parse(r);const d=getDefaultState();return{...d,...s,days:{...d.days,...s.days},pausedDays:{...d.pausedDays,...(s.pausedDays||{})},dailyPlan:{...d.dailyPlan,...(s.dailyPlan||{})},weeklyFocus:{...d.weeklyFocus,...(s.weeklyFocus||{})},authorizations:{...d.authorizations,...(s.authorizations||{})},growData:{...d.growData,...(s.growData||{})},lightData:{...d.lightData,...(s.lightData||{})}};}catch(e){}}return getDefaultState();}
        function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}
        let state=loadState();
        function getTodayDayNumber(){if(!state.startDate)return 0;const s=new Date(state.startDate),t=new Date();return Math.max(1,Math.min(TOTAL_DAYS,Math.floor((t-s)/(1000*60*60*24))+1));}
        function getDaysSinceLastActive(){if(!state.lastActiveDate)return 0;return Math.floor((new Date()-new Date(state.lastActiveDate))/(1000*60*60*24));}
        function getProgress(){const t=getTodayDayNumber(),c=Object.keys(state.days).length,p=Object.keys(state.pausedDays).filter(d=>!state.pausedDays[d]._planned).length;return{total:TOTAL_DAYS,completed:c,paused:p,remaining:Math.max(0,TOTAL_DAYS-t),percent:Math.min(100,Math.round((c/Math.max(1,t-p))*100)),today:t};}
        function getCurrentWeekNumber(){return Math.ceil(getTodayDayNumber()/7);}
        function formatDate(d){if(!state.startDate)return'День '+d;const s=new Date(state.startDate);s.setDate(s.getDate()+d-1);const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];return s.getDate()+' '+m[s.getMonth()];}
        function getRandomPhrase(c){const p=SUPPORT_PHRASES[c];return p[Math.floor(Math.random()*p.length)];}
        function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

        function getWeekStartDay(){const t=getTodayDayNumber();return Math.max(1,Math.floor((t-1)/7)*7+1);}
        function getWeekEndDay(){return Math.min(TOTAL_DAYS,getWeekStartDay()+6);}

        function render(){const a=document.getElementById('app');state.lastActiveDate=new Date().toISOString().split('T')[0];saveState(state);const da=getDaysSinceLastActive();if(da>=3&&state.screen==='trail'&&state.startDate&&getTodayDayNumber()>1){a.innerHTML=renderReturnScreen();attachListeners();return;}switch(state.screen){case'create_wanderer':a.innerHTML=renderCreateWanderer();break;case'choose_tempo':a.innerHTML=renderChooseTempo();break;case'set_track':a.innerHTML=renderSetTrack();break;case'choose_depth':a.innerHTML=renderChooseDepth();break;case'set_goal_light':a.innerHTML=renderSetGoalLight();break;case'grow_session':a.innerHTML=renderGrowSession();break;case'set_rhythm':a.innerHTML=renderSetRhythm();break;case'set_values':a.innerHTML=renderSetValues();break;case'trail':a.innerHTML=renderTrail();break;case'daily_card':a.innerHTML=renderDailyCard(state.currentViewDay||getTodayDayNumber());break;case'missed_day':a.innerHTML=renderMissedDay(state.currentViewDay);break;case'paused_day':a.innerHTML=renderPausedDay(state.currentViewDay);break;case'review_day':a.innerHTML=renderReviewDay(state.currentViewDay);break;case'completed':a.innerHTML=renderSummary();break;default:a.innerHTML=renderTrail();}attachListeners();}

        function renderCreateWanderer(){const h=state.completedCycles>0;return`<div class="card text-center"><div style="font-size:48px;margin-bottom:8px;">🏛️</div><h1>Мой Олимп</h1><p class="text-muted mb-8" style="font-size:14px;">«Путь на Олимп» — 30 дней, чтобы легализовать свою силу.<br>Начать говорить о себе и зарабатывать как PRO</p><p class="text-muted mb-8" style="font-size:12px;">Ты эксперт. Ты уже знаешь больше, чем думаешь.<br>Осталось только разрешить себе быть собой<br>и монетизировать это. Начать заявлять о себе играючи.</p><div class="summary-section mb-12" style="text-align:left;font-size:12px;color:var(--text-light);line-height:1.5;"><p style="margin-bottom:6px;">Это не трекер привычек. Это твой личный навигатор на 30 дней — чтобы легализовать свою е*анцу, заявить о себе и сделать шаг к деньгам, которые ты заслуживаешь.</p><p style="margin-bottom:4px;">Ты можешь поставить любую цель:</p><p style="margin-bottom:2px;">— построить личный бренд</p><p style="margin-bottom:2px;">— получить первого или следующего клиента</p><p style="margin-bottom:2px;">— запустить продукт или проект</p><p style="margin-bottom:2px;">— повысить прайс и продать по нему</p><p style="margin-bottom:8px;">— усилить видимость и получить подписчиков</p><p>Но за любой из этих целей стоит одно: <strong>ты разрешаешь себе быть собой — и зарабатывать на этом.</strong></p><p style="margin-top:6px;">Каждый день ты будешь делать один шаг к своему Олимпу. Не через «надо» и «должна». А через честность, самоценность и игру.</p></div>${h?`<div class="return-banner"><h3>🌟 С возвращением, богиня!</h3><p class="text-muted">Ты прошла ${state.completedCycles} ${state.completedCycles===1?'месяц':state.completedCycles<5?'месяца':'месяцев'} на пути к Олимпу.</p></div>`:''}<label style="text-align:left;">Как зовут тебя, богиня?</label><input type="text" id="wandererName" placeholder="Твоё имя на Олимпе" value="${escapeHtml(state.wandererName)}" maxlength="30" autocomplete="off"><label style="text-al         function renderChooseTempo(){const r=state.completedCycles>0;return`<div class="card text-center"><div style="font-size:44px;">${state.wandererEmoji||'👑'}</div><h2>${state.wandererName||'Богиня'}, выбери темп</h2><p class="text-muted mb-16">Как хочешь начать?</p><div class="tempo-options" id="tempoOptions">${!r?`<button class="tempo-card" data-tempo="soft"><span class="tempo-icon">🌱</span><span class="tempo-title">Мягкое восхождение</span><span class="tempo-desc">3 дня: имя → трек+цель → ценности+ритм</span></button><button class="tempo-card" data-tempo="confident"><span class="tempo-icon">🌿</span><span class="tempo-title">Уверенный шаг</span><span class="tempo-desc">2 дня</span></button>`:''}<button class="tempo-card" data-tempo="deep"><span class="tempo-icon">🏛️</span><span class="tempo-title">${r?'Быстрый старт':'На Олимп сразу'}</span><span class="tempo-desc">Всё за один заход</span></button></div><button class="btn btn-primary mt-12 hidden" id="btnConfirmTempo">Продолжить</button></div>`;}
        function renderSetTrack(){return`<div class="card"><div style="text-align:center;font-size:40px;margin-bottom:8px;">${state.wandererEmoji||'👑'}</div><h2 class="text-center">${state.wandererName||'Богиня'}, что ты хочешь создать?</h2><p class="text-muted text-center mb-12">Выбери трек:</p><div class="track-options" id="trackOptions">${TRACKS.map(t=>`<button class="track-card ${state.selectedTrack===t.id?'selected':''}" data-track="${t.id}"><span class="track-icon">${t.icon}</span><div><div class="track-title">${t.title}</div><div class="track-desc">${t.desc}</div></div></button>`).join('')}</div><button class="btn btn-primary mt-8" id="btnSaveTrack">Дальше</button></div>`;}

        function renderTrail(){

        function renderStepCells(t){let c='';c+=`<div class="step-cell start-cell" title="Старт">🏛️</div>`;for(let d=1;d<=TOTAL_DAYS;d++){let cl='',co=d,ti=`День ${d}`;if(state.days[d]){cl='completed';co='⭐';ti=`Пройден`;}else if(state.pausedDays[d]&&!state.pausedDays[d]._planned){cl='paused';co='🛌';ti=`У подножия`;}else if(state.pausedDays[d]&&state.pausedDays[d]._planned){cl='planned-pause';co='🛌';ti=`Запланирован`;}else if(d<t){cl='missed';co='·';ti=`Упущен`;}else if(d===t){cl='today';co=d;ti=`Сегодня`;}else{cl='future';co='🔒';ti=`Будущее`;}c+=`<button class="step-cell ${cl}" data-day="${d}" title="${ti}" ${cl==='future'?'disabled':''}><span class="day-num">${d}</span>${co}</button>`;}c+=`<div class="step-cell finish-cell" title="Вершина">🏆</div>`;return c;}

)h+=`<div class="trail-block green"><div class="trail-block-header"><span class="trail-block-icon">🌸</span><strong>Сад благодарности</strong></div><textarea id="gratitudeInputTrail" placeholder="Я благодарна за..."></textarea><button class="btn btn-primary btn-sm mt-8" id="btnSaveGratitudeTrail">Добавить</button></div>`;if(tf>=7)h+=`<div class="trail-block gold text-center"><p style="font-size:13px;">Поделиться неделей с Катей?</p><button class="btn btn-sm btn-outline" id="btnShareWeek">Поделиться</button></div>`;return h;}

            const isG=state.goalDepth==='grow';const isL=state.goalDepth==='light';const allAuths=Object.entries(state.authorizations).flatMap(([d,aa])=>aa.map(a=>({...a,day:parseInt(d)})));

        // ИСПРАВЛЕННАЯ функция модального окна фокуса недели
        function showFocusModal(currentFocus){
            // Удаляем предыдущее модальное окно, если есть
            const existing = document.getElementById('focusModal');
            if(existing) existing.remove();

            const h = `<div class="modal-overlay" id="focusModal"><div class="modal-content"><h3>📅 Фокус недели</h3><p class="text-muted">Одна фраза. Широкий мазок. Что самое важное на этой неделе?</p><textarea id="focusInput" placeholder="На этой неделе я...">${escapeHtml(currentFocus)}</textarea><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-outline btn-sm" id="btnCloseFocus" style="flex:1;">Отмена</button><button class="btn btn-gold" id="btnSaveFocus" style="flex:2;">Сохранить</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', h);

            document.getElementById('btnSaveFocus').addEventListener('click', () => {
                const v = document.getElementById('focusInput').value.trim();
                state.weeklyFocus[getCurrentWeekNumber()] = v;
                saveState(state);
                document.getElementById('focusModal').remove();
                render(); // Перерисовываем только после сохранения
            });

            document.getElementById('btnCloseFocus').addEventListener('click', () => {
                document.getElementById('focusModal').remove();
                // Не вызываем render() — просто закрываем окно, layout не ломается
            });

            // Закрытие по клику на оверлей
            document.getElementById('focusModal').addEventListener('click', function(e) {
                if(e.target === this) {
                    this.remove();
                }
            });
        }

        function attachAuthListeners(task){
            const ng=document.getElementById('needsGrid');if(ng)ng.addEventListener('click',(e)=>{const c=e.target.closest('[data-need]');if(c){document.querySelectorAll('#needsGrid .need-chip').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');document.getElementById('authNeedCustom').value='';}});
            const bsa=document.getElementById('btnSaveAuth');if(bsa)bsa.addEventListener('click',()=>{const t=getTodayDayNumber();if(!state.authorizations[t])state.authorizations[t]=[];
            const needEl=document.querySelector('#needsGrid .need-chip.selected');const need=needEl?needEl.dataset.need:(document.getElementById('authNeedCustom')?.value||'');
            const neg=document.querySelector('input[name="authNegative"]:checked');const isNeg=neg&&neg.value;
            state.authorizations[t].push({task,action:document.getElementById('authAction')?.value||'',result:document.getElementById('authResult')?.value||'',need,negative:!!isNeg,learn:isNeg==='learn'?document.getElementById('authLearn')?.value:'',timestamp:new Date().toISOString()});
            saveState(state);document.getElementById('authModal')?.remove();render();});
            const bca=document.getElementById('btnCloseAuth');if(bca)bca.addEventListener('click',()=>{document.getElementById('authModal')?.remove();});
        }

        function saveLightData(){state.lightData={goal:document.getElementById('lgGoal')?.value||'',signs:document.getElementById('lgSigns')?.value||'',ownGoal:document.getElementById('lgOwnGoal')?.value||'',why:document.getElementById('lgWhy')?.value||'',scale:state.lightData.scale||5,resources:document.getElementById('lgResources')?.value||''};}
        function saveGrowData(){const g=state.growData;if(g.step===1){g.g1=document.getElementById('gG1')?.value||'';g.g2=document.getElementById('gG2')?.value||'';g.g3=document.getElementById('gG3')?.value||'';g.g4=document.getElementById('gG4')?.value||'';}else if(g.step===2){g.r1=document.getElementById('gR1')?.value||'';g.r3=document.getElementById('gR3')?.value||'';g.r4=document.getElementById('gR4')?.value||'';g.r5=document.getElementById('gR5')?.value||'';}else if(g.step===3){g.o1=document.getElementById('gO1')?.value||'';g.o2=document.getElementById('gO2')?.value||'';g.o3=document.getElementById('gO3')?.value||'';}else if(g.step===4){g.w1=document.getElementById('gW1')?.value||'';g.w2=document.getElementById('gW2')?.value||'';g.w4=document.getElementById('gW4')?.value||'';g.w5=document.getElementById('gW5')?.value||'';}saveState(state);}

        function updateIntensityPanel(){const p=document.getElementById('intensityPanel');if(!p)return;const s=[...document.querySelectorAll('#feelingsGrid .feeling-chip.selected')];if(!s.length){p.classList.add('hidden');return;}p.classList.remove('hidden');const f=FEELINGS.find(ff=>ff.id===s[s.length-1].dataset.feeling);if(!f)return;p.innerHTML=`<div style="font-size:12px;">Насколько сильно ${f.emoji} ${f.name}?</div><div class="intensity-row">${[1,2,3,4,5].map(i=>`<div class="intensity-dot" data-feeling="${f.id}" data-intensity="${i}"></div>`).join('')}<span class="intensity-label" id="intensityLabel"></span></div>`;p.querySelectorAll('.intensity-dot').forEach(d=>{d.addEventListener('click',()=>{p.querySelectorAll('.intensity-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active');document.getElementById('intensityLabel').textContent=d.dataset.intensity==='1'?'еле-еле':d.dataset.intensity==='2'?'слегка':d.dataset.intensity==='3'?'заметно':d.dataset.intensity==='4'?'сильно':'очень сильно';});});}
        function updateHeavyContainer(){const c=document.getElementById('heavyFeelingContainer');if(!c)return;const s=[...document.querySelectorAll('#feelingsGrid .feeling-chip.selected')].map(x=>x.dataset.feeling);const h=s.filter(fid=>HEAVY_FEELINGS[fid]);if(h.length){const hf=HEAVY_FEELINGS[h[0]];c.innerHTML=`<div class="container-box"><h4>${hf.title}</h4><p>${hf.body}</p><p><strong>${hf.truth}</strong></p><a href="${TG_KATYA}" target="_blank" class="btn btn-accent btn-sm mt-8">Мне нужно больше поддержки</a></div>`;}else c.innerHTML='';}

        function buildDayShareText(dn,d){const f=d.feelings?d.feelings.map(fid=>{const ff=FEELINGS.find(x=>x.id===fid);const i=d.feelingIntensities?.[fid]||0;return ff?`${ff.emoji} ${ff.name}${i>0?' '+'●'.repeat(i):''}`:fid;}).filter(Boolean):[];let t=`🏛️ ${state.wandererName||'Богиня'}, ${formatDate(dn)}\n\nПриближение: ${d.scale}/10\n`;if(f.length)t+=`Чувства: ${f.join(', ')}\n`;if(d.insight)t+=`\n💡 Инсайт: ${d.insight}\n`;t+=`\n— Мой Олимп`;return t;}
        function buildWeekShareText(){const t=getTodayDayNumber();const w=Math.max(1,t-6);const wd=Object.entries(state.days).filter(([d])=>parseInt(d)>=w&&parseInt(d)<=t).map(([d,dd])=>({day:parseInt(d),...dd}));const wf=state.weeklyFocus[getCurrentWeekNumber()]||'';let tx=`📅 ${state.wandererName||'Богиня'}, неделя\n`;if(wf)tx+=`Фокус: «${wf}»\n`;tx+='\n';wd.forEach(d=>{tx+=`Шаг ${d.day}: ${d.scale}/10`;if(d.insight)tx+=` — ${d.insight.substring(0,60)}`;tx+='\n';});tx+=`\n— Мой Олимп`;return tx;}
        function buildSummaryShareText(){const p=getProgress();const ad=Object.entries(state.days).map(([d,dd])=>({day:parseInt(d),...dd}));const sc=ad.map(d=>d.scale||0);const av=sc.length>0?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):0;let t=`🏆 ${state.wandererName||'Богиня'}, восхождение завершено\n\nШагов: ${p.completed}/${TOTAL_DAYS}\nСреднее: ${av}/10\n`;t+=`\n— Мой Олимп`;return t;}
        function shareToTelegram(text){window.open(`https://t.me/ginger_coach4you?text=${encodeURIComponent(text)}`,'_blank');}
        function saveAsPDF(){const h=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Мой Олимп</title><style>body{font-family:-apple-system,sans-serif;padding:24px;max-width:520px;margin:0 auto;}h1{color:#4a7c96;}</style></head><body><h1>🏛️ ${state.wandererEmoji||'👑'} ${state.wandererName||'Богиня'}</h1><p>${escapeHtml(state.goal||'')}</p></body></html>`;const pw=window.open('','_blank');pw.document.write(h);pw.document.close();setTimeout(()=>pw.print(),500);}

        if(state.startDate&&state.screen!=='completed'&&getTodayDayNumber()>TOTAL_DAYS)state.screen='completed';
        render();
    </script>
</body>
</html>
